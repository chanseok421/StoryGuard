# Render Blueprint — StoryGuard 백엔드(Express + Docker)
# Render 대시보드 → New → Blueprint → 이 레포 선택하면 이 서비스를 만든다.
# sync:false 인 값(시크릿/도메인)은 대시보드에서 직접 입력해야 한다.
services:
  - type: web
    name: storyguard-be
    runtime: docker
    rootDir: BE
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: free
    envVars:
      # --- 고정값 ---
      - key: AI_ANALYSIS_PROVIDER
        value: deepagent
      - key: DEEPAGENT_MODEL
        value: gpt-4o-mini # 배포본은 요청 타임아웃 안전하게 mini 권장(gpt-4o는 1~3분)
      - key: VECTOR_STORE
        value: memory # 외부 벡터DB 없이 동작(deepagent는 settingsText 키워드 폴백)
      - key: EMBEDDING_PROVIDER
        value: openai # 클라우드엔 Ollama가 없으므로 OpenAI 임베딩 사용
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none # FE/BE 도메인이 다르므로 크로스사이트 쿠키 허용
      - key: LOG_LEVEL
        value: info
      # --- 시크릿/도메인: 대시보드에서 입력 ---
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false # 프론트 배포 URL (예: https://storyguard.vercel.app)
      # PORT 는 Render가 자동 주입한다(앱은 process.env.PORT 사용). 설정하지 말 것.
